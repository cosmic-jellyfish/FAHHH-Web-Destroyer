<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FAHHH</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="wrap">
      <img class="title-logo" src="Fahh_text.png" alt="FAHHH!" />
      <p class="tagline" id="tagline">The polite page destructor.</p>

      <button id="pickElements" type="button">Pick on page…</button>

      <p class="hint">
        <strong>Right-click</strong> something → context menu → FAHHH that element.
        Or <strong>Pick on page</strong>: click one or more targets, then Enter (Esc cancels).
      </p>

      <p class="attribution">
        Made with love by
        <a
          href="https://github.com/cosmic-jellyfish"
          target="_blank"
          rel="noopener noreferrer"
          >cosmic-jellyfish</a
        >.
      </p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
